<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Image Unlock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
        }

        img {
            max-width: 300px;
            margin: 20px auto;
            display: block;
        }
    </style>
</head>
<body>

    <h2>Enter the secret code</h2>

    <input type="text" id="codeInput" placeholder="Enter code">
    <button onclick="checkCode()">Submit</button>

    <p id="message"></p>

    <!-- Images for Q1–Q7 -->
    <img id="q1" src="Q1.png" alt="Q1 Image" hidden>
    <img id="q2" src="Q2.png" alt="Q2 Image" hidden>
    <img id="q3" src="Q3.png" alt="Q3 Image" hidden>
    <img id="q4" src="Q4.png" alt="Q4 Image" hidden>
    <img id="q5" src="Q5.png" alt="Q5 Image" hidden>
    <img id="q6" src="Q6.png" alt="Q6 Image" hidden>
    <img id="q7" src="Q7.png" alt="Q7 Image" hidden>

    <script>
        const answerMap = {
            "west": "q1",
            "7": "q2",
            "seven": "q2",
            "18": "q3",
            "92": "q4",
            "32": "q5",
            "1960": "q6",
            "ireland": "q7",
            "irish": "q7"
        };

        function checkCode() {
            const userCode = document.getElementById("codeInput").value.trim().toLowerCase();
            const message = document.getElementById("message");

            // Hide all images first
            document.querySelectorAll("img").forEach(img => {
                img.hidden = true;
            });

            if (answerMap[userCode]) {
                const imageId = answerMap[userCode];
                document.getElementById(imageId).hidden = false;
                message.textContent = "Correct!";
            } else {
                message.textContent = "Incorrect code.";
            }
        }
    </script>

</body>
</html>
